<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

form{display:grid;gap:8px;max-width:300px;border:1px solid #aaa;padding:10px}
#msg{font-weight:bold}
</style>

<script>
function subscribe(e){
  e.preventDefault();
  
  const fullName = document.getElementById("full").value.trim();
  const email = document.getElementById("email").value.trim();
  const interests = document.querySelectorAll("input[name='interest']:checked");
  const msg = document.getElementById("msg");

  if (fullName.length < 3) {
    msg.textContent = "Tên phải có ít nhất 3 ký tự";
    msg.style.color = "red";
    return;
  }

  const isEmailValid = /^[^@]+@[^@]+\.[^@]+$/.test(email);

  if (!isEmailValid) {
    msg.textContent = "Email không hợp lệ (cần có @ và tên miền)";
    msg.style.color = "red";
    return;
  }

  if (interests.length === 0) {
    msg.textContent = "Cần chọn ít nhất 1 sở thích";
    msg.style.color = "red";
    return;
  }

  msg.textContent = "Đăng ký thành công!";
  msg.style.color = "green";
}
</script>
</head>

<body>
<form onsubmit="subscribe(event)">
  <label class="">Full Name
    <input type="text" id="full">
  </label>

  <label>Email
    <input type="email" id="email">
  </label>

  <label>Subscription Type<br>
    <input type="radio" name="type" checked> Monthly
    <input type="radio" name="type"> Yearly
  </label>

  <label>Interests<br>
    <input type="checkbox" name="interest"> Tech
    <input type="checkbox" name="interest"> Books
    <input type="checkbox" name="interest"> Deals
  </label>

  <button>Subscribe</button>
  <div id="msg"></div>
</form>
</body>
</html>
