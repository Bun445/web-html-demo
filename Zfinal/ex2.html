<!-- Exercise 2: Create a computer parts price list table with these requirements:
1. Create table with 4 computer parts and prices
2. Use HTML5 structure (DOCTYPE, head, body)
3. Include these HTML entities: ©, ™, •
4. Style table with borders and padding
5. Add "Change Color" button that:
o When clicked, changes all table text to red
o Use changeColor() function and getElementById() -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Parts</title>

<style>
table{border-collapse:collapse}
th,td{border:1px solid #000;padding:8px}
</style>
</head>

<body>

<h2>Computer Parts ™</h2>
<p>Price list • © 2025</p>

<table id="partsTable">
<tr><th>Part</th><th>Price</th></tr>
<tr><td>CPU</td><td>$200</td></tr>
<tr><td>RAM</td><td>$80</td></tr>
<tr><td>SSD</td><td>$120</td></tr>
<tr><td>Graphics Card</td><td>$350</td></tr>
</table>

<button onclick="changeColor()">Change Color</button>

<script>
function changeColor(){
  document.getElementById("partsTable").style.color="red";
}
</script>

</body>
</html>
